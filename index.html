<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>终将落地的心 — 致2026高考生</title>
<style>
/* ==================== RESET & BASE ==================== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  /* Use dvh when supported (mobile browsers), fallback to vh */
  height: 100dvh;
  overflow: hidden;
  font-family: 'Source Han Serif SC', 'Noto Serif SC', 'STSong', 'Songti SC', 'SimSun', 'FangSong', 'KaiTi', 'Georgia', serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: #f5f0e6;
  touch-action: none;
  -webkit-overflow-scrolling: none;
  user-select: none;
  -webkit-user-select: none;
}

/* ==================== CANVAS LAYER ==================== */
#particleCanvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 10;
  pointer-events: none;
}

/* ==================== PAGES CONTAINER ==================== */
.pages-container {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  height: 100dvh;
  z-index: 1;
}

.page {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s cubic-bezier(0.4, 0, 0.3, 1);
  z-index: 1;
  overflow: hidden;
}

.page.active {
  opacity: 1;
  pointer-events: auto;
  z-index: 2;
}

/* ==================== PAGE BACKGROUNDS ==================== */
.page::before {
  content: '';
  position: absolute; inset: 0;
  z-index: 0;
  transition: background 2s ease;
}

/* ── Cloud mist overlay (all pages) ── */
.page::after {
  content: '';
  position: absolute; inset: -50%;
  z-index: 0;
  pointer-events: none;
  animation: cloudDrift 36s ease-in-out infinite alternate;
}

@keyframes cloudDrift {
  0% { transform: translate(-2%, -1.5%); }
  50% { transform: translate(1.5%, 2%); }
  100% { transform: translate(-1%, -0.5%); }
}

/* ===== COVER PAGE background ===== */
.page-cover::before {
  background:
    radial-gradient(ellipse at 60% 30%, rgba(255,220,150,0.45) 0%, transparent 55%),
    radial-gradient(ellipse at 30% 70%, rgba(255,200,130,0.35) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255,235,190,0.3) 0%, transparent 60%),
    linear-gradient(160deg, #fef9f0 0%, #fdf3e0 30%, #faf0dd 60%, #fef7ec 100%);
  animation: coverBgFlow 24s ease-in-out infinite alternate;
}
.page-cover::after {
  background:
    radial-gradient(ellipse at 25% 35%, rgba(255,210,140,0.22) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 60%, rgba(255,190,120,0.18) 0%, transparent 50%);
}

@keyframes coverBgFlow {
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 60%; }
  100% { background-position: 20% 100%; }
}

/* ===== PAGE 1 background: teal + warm orange ===== */
.page-1::before {
  background:
    radial-gradient(ellipse at 20% 30%, rgba(120,180,175,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 65%, rgba(235,170,125,0.35) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(245,225,200,0.25) 0%, transparent 55%),
    linear-gradient(150deg, #f6f9f0 0%, #eef6f2 30%, #fdf3ec 60%, #fefaf5 100%);
  animation: page1BgFlow 28s ease-in-out infinite alternate;
}
.page-1::after {
  background:
    radial-gradient(ellipse at 15% 45%, rgba(100,170,165,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 55%, rgba(240,175,130,0.15) 0%, transparent 50%);
}

@keyframes page1BgFlow {
  0% { background-position: 0% 0%; }
  100% { background-position: 60% 80%; }
}

/* ===== PAGE 2 background: blue-purple dreamy ===== */
.page-2::before {
  background:
    radial-gradient(ellipse at 30% 25%, rgba(130,150,210,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 60%, rgba(170,130,200,0.35) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(220,210,240,0.25) 0%, transparent 55%),
    linear-gradient(140deg, #f7f5fc 0%, #f0eff8 30%, #f5f0f8 60%, #faf7fd 100%);
  animation: page2BgFlow 26s ease-in-out infinite alternate;
}
.page-2::after {
  background:
    radial-gradient(ellipse at 35% 30%, rgba(140,160,220,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 70%, rgba(180,140,210,0.18) 0%, transparent 50%);
}

@keyframes page2BgFlow {
  0% { background-position: 0% 0%; }
  100% { background-position: 80% 50%; }
}

/* ===== PAGE 3 background: warm brown + soft red ===== */
.page-3::before {
  background:
    radial-gradient(ellipse at 40% 30%, rgba(200,155,120,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 65% 65%, rgba(215,150,140,0.35) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(235,200,175,0.25) 0%, transparent 55%),
    linear-gradient(155deg, #fcf6f0 0%, #faf0e8 30%, #faf0eb 60%, #fdf7f4 100%);
  animation: page3BgFlow 30s ease-in-out infinite alternate;
}
.page-3::after {
  background:
    radial-gradient(ellipse at 45% 40%, rgba(190,145,110,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 60%, rgba(210,145,135,0.15) 0%, transparent 50%);
}

@keyframes page3BgFlow {
  0% { background-position: 0% 0%; }
  100% { background-position: 50% 100%; }
}

/* ===== PAGE 4 background: warm golden ===== */
.page-4::before {
  background:
    radial-gradient(ellipse at 50% 50%, rgba(245,200,120,0.4) 0%, transparent 55%),
    radial-gradient(ellipse at 35% 35%, rgba(255,220,140,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 65% 60%, rgba(240,190,110,0.3) 0%, transparent 50%),
    linear-gradient(160deg, #fef9f0 0%, #fdf3e0 30%, #fef5e5 60%, #fef8ed 100%);
  animation: page4BgFlow 20s ease-in-out infinite alternate;
}
.page-4::after {
  background:
    radial-gradient(ellipse at 50% 50%, rgba(255,210,130,0.2) 0%, transparent 50%);
}

@keyframes page4BgFlow {
  0% { background-position: 0% 0%; }
  100% { background-position: 100% 100%; }
}

/* ==================== PAGE CONTENT WRAPPER ==================== */
.page-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 2rem;
  max-width: 680px;
  width: 90%;
}

/* ==================== COVER PAGE (0) ==================== */
.page-cover .cover-title {
  font-size: clamp(2.7rem, 6.5vw, 5.2rem);
  font-weight: 900;
  color: #2c2416;
  letter-spacing: 0.12em;
  line-height: 1.3;
  animation: titleReveal 3s cubic-bezier(0.23, 1, 0.32, 1) forwards;
}

.page-cover .cover-title-glow {
  animation: titleBreathe 8s ease-in-out 3s infinite;
}

@keyframes titleReveal {
  0% { opacity: 0; filter: blur(18px); transform: translateY(8px); }
  100% { opacity: 1; filter: blur(0); transform: translateY(0); }
}

@keyframes titleBreathe {
  0%, 100% { text-shadow: 0 0 20px rgba(200,160,80,0), 0 0 0 rgba(200,160,80,0), 0 0 0 rgba(255,200,100,0); }
  50% { text-shadow: 0 0 25px rgba(220,180,90,0.5), 0 0 55px rgba(200,160,80,0.25), 0 0 80px rgba(255,200,100,0.12); }
}

.page-cover .cover-subtitle {
  font-size: clamp(1.05rem, 2.2vw, 1.5rem);
  color: #8b7355;
  letter-spacing: 0.2em;
  margin-top: 2.2rem;
  font-weight: 400;
  animation: subtitleReveal 2.5s cubic-bezier(0.23, 1, 0.32, 1) 0.8s forwards;
  opacity: 0;
}

@keyframes subtitleReveal {
  0% { opacity: 0; filter: blur(6px); transform: translateY(4px); }
  100% { opacity: 1; filter: blur(0); transform: translateY(0); }
}

.page-cover .cover-line {
  width: 60px;
  height: 1px;
  background: #c4a882;
  margin: 2rem auto 0;
  animation: lineReveal 2s ease 1.3s forwards;
  opacity: 0;
  transform: scaleX(0);
}

@keyframes lineReveal {
  to { opacity: 1; transform: scaleX(1); }
}

/* Cover scroll hint */
.scroll-hint {
  position: absolute;
  bottom: 2.5rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  opacity: 0;
  animation: hintFade 2s ease 3.5s forwards;
}

.scroll-hint span {
  display: block;
  width: 24px; height: 24px;
  border-right: 1.5px solid #b8a890;
  border-bottom: 1.5px solid #b8a890;
  transform: rotate(45deg);
  animation: hintBob 2s ease-in-out infinite;
}

@keyframes hintFade {
  to { opacity: 0.5; }
}

@keyframes hintBob {
  0%, 100% { transform: rotate(45deg) translateY(0); }
  50% { transform: rotate(45deg) translateY(8px); }
}

/* ==================== POEM PAGES COMMON ==================== */
.poem-line {
  font-size: clamp(1.15rem, 2.8vw, 1.65rem);
  font-weight: 400;
  color: #2c2416;
  line-height: 2.6;
  letter-spacing: 0.1em;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 2.8s cubic-bezier(0.33, 0, 0.08, 1), transform 2.8s cubic-bezier(0.33, 0, 0.08, 1);
}

.poem-line.visible {
  opacity: 1;
  transform: translateY(0);
}

.poem-stanza { margin-bottom: 0.6rem; }

/* Page 1 - swaying text */
.page-1 .poem-line {
  position: relative;
}
.page-1 .poem-line.visible {
  animation: gentleSway 12s ease-in-out 3.2s infinite;
}

@keyframes gentleSway {
  0%, 100% { left: 0; }
  25% { left: -1.8px; }
  75% { left: 1.8px; }
}

/* Staggered delays for line reveal */
.delay-0 { transition-delay: 0.3s; }
.delay-1 { transition-delay: 1s; }
.delay-2 { transition-delay: 1.7s; }
.delay-3 { transition-delay: 2.4s; }
.delay-4 { transition-delay: 3.1s; }

/* Page 2 - dreamy pulse text */
.page-2 .poem-line.visible {
  animation: dreamPulse 10s ease-in-out 3.2s infinite;
}

@keyframes dreamPulse {
  0%, 100% { filter: brightness(1) saturate(1); }
  50% { filter: brightness(1.05) saturate(1.03); }
}

/* Page 3 - floating text */
.page-3 .poem-line.visible {
  animation: textFloat 10s ease-in-out 3.2s infinite;
}

@keyframes textFloat {
  0%, 100% { margin-top: 0; }
  25% { margin-top: -4px; }
  75% { margin-top: 4px; }
}

/* Page 4 - settling text */
.page-4 .poem-line {
  transition-delay: var(--settle-delay, 0s);
}
.page-4 .poem-line.visible {
  animation: settleFloat 12s ease-in-out 4s infinite;
}

@keyframes settleFloat {
  0%, 100% { margin-top: 0; }
  15% { margin-top: 3px; }
  40% { margin-top: 0; }
  55% { margin-top: -1px; }
  70% { margin-top: 0; }
}

/* Page 4 - warm glow */
.page-4.active::before {
  animation: warmGlow 6s ease 2s forwards;
}

@keyframes warmGlow {
  0% { filter: brightness(1); }
  100% {
    filter: brightness(1.15);
    background:
      radial-gradient(ellipse at 50% 50%, rgba(255,210,120,0.55) 0%, rgba(255,190,100,0.3) 40%, transparent 65%),
      radial-gradient(ellipse at 35% 35%, rgba(255,220,140,0.35) 0%, transparent 50%),
      radial-gradient(ellipse at 65% 60%, rgba(240,190,110,0.35) 0%, transparent 50%),
      linear-gradient(160deg, #fef9f0 0%, #fef6e5 30%, #fef8ea 60%, #fffaf2 100%);
  }
}

/* Page 4 - gentle warm dim at the end */
.page-4.final-dim {
  transition: filter 4s ease 1.5s;
  filter: brightness(0.72) saturate(1.1);
}

/* ==================== NAVIGATION DOTS ==================== */
.nav-dots {
  position: fixed; right: 1.2rem; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 1rem;
  z-index: 20;
}

.nav-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(139,115,85,0.3);
  transition: all 0.6s ease;
  cursor: pointer;
  pointer-events: auto;
}

.nav-dot.active {
  background: rgba(139,115,85,0.8);
  transform: scale(1.4);
}

/* ==================== MOBILE ==================== */
@media (max-width: 768px) {
  .poem-line {
    font-size: clamp(0.95rem, 4vw, 1.2rem);
    line-height: 2;
  }

  .page-cover .cover-title {
    font-size: clamp(2rem, 9vw, 3.2rem);
  }

  .page-cover .cover-subtitle {
    font-size: clamp(0.8rem, 3vw, 1.1rem);
  }

  .page-content { padding: 1.2rem; }

  .nav-dots { right: 0.6rem; gap: 0.8rem; }
  .nav-dot { width: 6px; height: 6px; }
}

@media (max-width: 480px) {
  .poem-line {
    font-size: 0.95rem;
    line-height: 1.9;
  }

  .page-cover .cover-title {
    font-size: 1.9rem;
    letter-spacing: 0.08em;
  }
}
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="pages-container">

  <!-- ===== PAGE 0: COVER ===== -->
  <section class="page page-cover active" id="page0" data-page="0">
    <div class="page-content">
      <h1 class="cover-title">
        <span class="cover-title-glow">终将落地的心</span>
      </h1>
      <p class="cover-subtitle">致 2026 全体高考生</p>
      <div class="cover-line"></div>
    </div>
    <div class="scroll-hint"><span></span></div>
  </section>

  <!-- ===== PAGE 1: POEM 1 ===== -->
  <section class="page page-1" id="page1" data-page="1">
    <div class="page-content">
      <div class="poem-stanza">
        <p class="poem-line delay-0">我想要一个不由外在填补的内在</p>
        <p class="poem-line delay-1">我想要一个睁开但仍属于我的眼睛</p>
      </div>
      <div class="poem-stanza">
        <p class="poem-line delay-2">无论何种丑恶的诞生，不必时刻背负罪名</p>
        <p class="poem-line delay-3">悟得万千唯一的共性</p>
      </div>
      <div class="poem-stanza">
        <p class="poem-line delay-4">在微微的风中稳住身形</p>
      </div>
    </div>
  </section>

  <!-- ===== PAGE 2: POEM 2 ===== -->
  <section class="page page-2" id="page2" data-page="2">
    <div class="page-content">
      <div class="poem-stanza">
        <p class="poem-line delay-0">我曾想象，</p>
        <p class="poem-line delay-1">一切遵循着简单的规律</p>
      </div>
      <div class="poem-stanza">
        <p class="poem-line delay-2">任我这唯一的意识发现&nbsp;&nbsp;遨游</p>
        <p class="poem-line delay-3">从未被过分违逆的直觉</p>
      </div>
      <div class="poem-stanza">
        <p class="poem-line delay-4">因此不可能是人的现实</p>
      </div>
    </div>
  </section>

  <!-- ===== PAGE 3: POEM 3 ===== -->
  <section class="page page-3" id="page3" data-page="3">
    <div class="page-content">
      <div class="poem-stanza">
        <p class="poem-line delay-0">我曾尝试</p>
        <p class="poem-line delay-1">抬起或放下重量，</p>
      </div>
      <div class="poem-stanza">
        <p class="poem-line delay-2">终究是扰乱心灵的戏码</p>
        <p class="poem-line delay-3">向前或向后展望，</p>
      </div>
      <div class="poem-stanza">
        <p class="poem-line delay-4">又是否是渴求强权的自大</p>
      </div>
    </div>
  </section>

  <!-- ===== PAGE 4: FINAL ===== -->
  <section class="page page-4" id="page4" data-page="4">
    <div class="page-content">
      <div class="poem-stanza">
        <p class="poem-line" style="--settle-delay: 0.3s">致我们心中的迷茫</p>
          <p class="poem-line" style="--settle-delay: 1.0s">致我们美好的身体</p>
          <p class="poem-line" style="--settle-delay: 1.7s">致我们漫漫无止的前路</p>
          <p class="poem-line" style="--settle-delay: 2.4s">以及终将落地的心。</p>
      </div>
    </div>
  </section>

</div>

<!-- NAVIGATION DOTS -->
<nav class="nav-dots" id="navDots">
  <div class="nav-dot active" data-index="0"></div>
  <div class="nav-dot" data-index="1"></div>
  <div class="nav-dot" data-index="2"></div>
  <div class="nav-dot" data-index="3"></div>
  <div class="nav-dot" data-index="4"></div>
</nav>

<script>
(function() {
  /* ==================== STATE ==================== */
  const totalPages = 5;
  let currentPage = 0;
  let isTransitioning = false;
  let transitionLockUntil = 0;

  /* ==================== DOM REFS ==================== */
  const pages = document.querySelectorAll('.page');
  const navDots = document.querySelectorAll('.nav-dot');
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');

  /* ==================== CANVAS SETUP ==================== */
  let W, H;

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    W = window.innerWidth;
    H = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  /* ==================== PARTICLE SYSTEM ==================== */
  let particles = [];

  // Color palettes
  const GOLDEN = ['rgba(255,210,120,0.9)', 'rgba(255,190,80,0.85)', 'rgba(255,225,150,0.9)', 'rgba(240,180,60,0.8)'];
  const PASTEL_FEATHER = ['rgba(255,200,200,0.65)', 'rgba(200,220,255,0.65)', 'rgba(220,255,220,0.65)', 'rgba(255,220,180,0.65)', 'rgba(230,200,255,0.65)'];
  const TEAL_ORANGE = ['rgba(100,180,175,0.55)', 'rgba(235,170,120,0.55)', 'rgba(130,200,185,0.5)', 'rgba(245,185,140,0.5)', 'rgba(160,210,195,0.45)'];
  const INNER_WORDS = ['自我', '内心', '坚定', '清醒', '安静', '自在'];
  const BLUE_PURPLE = ['rgba(130,160,220,0.7)', 'rgba(180,140,210,0.7)', 'rgba(100,180,230,0.65)', 'rgba(200,160,235,0.65)', 'rgba(160,200,240,0.6)'];
  const WARM_SHADOW = ['rgba(210,150,130,0.25)', 'rgba(190,140,100,0.25)', 'rgba(200,120,110,0.22)', 'rgba(180,130,90,0.2)'];
  const GOLDEN_CONVERGE = ['rgba(255,220,140,0.9)', 'rgba(255,200,100,0.85)', 'rgba(255,235,170,0.9)', 'rgba(245,180,80,0.8)', 'rgba(255,245,200,0.85)'];

  // ── Particle types ──
  function createCoverParticles() {
    const arr = [];
    // Golden starlight rising
    for (let i = 0; i < 40; i++) {
      arr.push({
        type: 'starRise',
        x: Math.random() * W,
        y: H + Math.random() * 250,
        size: Math.random() * 3 + 1,
        speed: Math.random() * 0.2 + 0.06,
        alpha: Math.random() * 0.7 + 0.25,
        phase: Math.random() * Math.PI * 2,
        wanderX: (Math.random() - 0.5) * 0.3,
        color: GOLDEN[Math.floor(Math.random() * GOLDEN.length)],
      });
    }
    // Colorful pastel feathers
    for (let i = 0; i < 15; i++) {
      arr.push({
        type: 'feather',
        x: Math.random() * W,
        y: -20 - Math.random() * H * 0.4,
        size: Math.random() * 16 + 8,
        speed: Math.random() * 0.22 + 0.08,
        alpha: Math.random() * 0.45 + 0.15,
        sway: Math.random() * 0.6 + 0.3,
        swaySpeed: Math.random() * 0.006 + 0.003,
        phase: Math.random() * Math.PI * 2,
        rotation: Math.random() * Math.PI * 2,
        color: PASTEL_FEATHER[Math.floor(Math.random() * PASTEL_FEATHER.length)],
      });
    }
    // Subtle glow dots
    for (let i = 0; i < 15; i++) {
      arr.push({
        type: 'glowDot',
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 4 + 2,
        speed: Math.random() * 0.12 + 0.03,
        alpha: Math.random() * 0.25 + 0.08,
        phase: Math.random() * Math.PI * 2,
        color: i < 8 ? 'rgba(255,210,130,0.4)' : 'rgba(255,180,100,0.35)',
      });
    }
    return arr;
  }

  function createPage1Particles() {
    const arr = [];
    // Colorful wind particles from corners
    const corners = [
      { x: -30, y: -30 }, { x: W + 30, y: -30 },
      { x: -30, y: H + 30 }, { x: W + 30, y: H + 30 }
    ];
    for (let i = 0; i < 45; i++) {
      const c = corners[Math.floor(Math.random() * 4)];
      arr.push({
        type: 'wind',
        x: c.x + (Math.random() - 0.5) * 150,
        y: c.y + (Math.random() - 0.5) * 150,
        size: Math.random() * 2.5 + 0.8,
        speed: Math.random() * 0.25 + 0.07,
        angle: Math.random() * Math.PI * 2,
        alpha: Math.random() * 0.4 + 0.1,
        life: 1,
        decay: Math.random() * 0.0012 + 0.0005,
        color: TEAL_ORANGE[Math.floor(Math.random() * TEAL_ORANGE.length)],
      });
    }
    // Colorful inner-word particles
    for (let i = 0; i < 10; i++) {
      const edge = Math.random();
      let sx, sy;
      if (edge < 0.25) { sx = -80; sy = Math.random() * H; }
      else if (edge < 0.5) { sx = W + 80; sy = Math.random() * H; }
      else if (edge < 0.75) { sx = Math.random() * W; sy = -80; }
      else { sx = Math.random() * W; sy = H + 80; }
      arr.push({
        type: 'innerWord',
        x: sx, y: sy,
        text: INNER_WORDS[i % INNER_WORDS.length],
        size: Math.random() * 12 + 14,
        speed: Math.random() * 0.18 + 0.07,
        angle: Math.atan2(H / 2 - sy, W / 2 - sx) + (Math.random() - 0.5) * 0.7,
        alpha: 0,
        fadeIn: true,
        life: 1,
        decay: Math.random() * 0.0003 + 0.00015,
        color: ['rgba(120,180,175,0.55)', 'rgba(235,155,110,0.55)', 'rgba(100,170,160,0.5)', 'rgba(220,145,100,0.5)'][Math.floor(Math.random() * 4)],
      });
    }
    return arr;
  }

  function createPage2Particles() {
    const arr = [];
    // Colorful light dots roaming (blue-purple spectrum)
    for (let i = 0; i < 55; i++) {
      arr.push({
        type: 'lightDot',
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 3.5 + 1,
        speed: Math.random() * 0.3 + 0.06,
        angle: Math.random() * Math.PI * 2,
        alpha: Math.random() * 0.7 + 0.2,
        glowSize: Math.random() * 22 + 10,
        phase: Math.random() * Math.PI * 2,
        pulseSpeed: Math.random() * 0.012 + 0.004,
        wander: Math.random() * 0.015 + 0.004,
        color: BLUE_PURPLE[Math.floor(Math.random() * BLUE_PURPLE.length)],
      });
    }
    // Colorful geometry lines
    for (let i = 0; i < 12; i++) {
      arr.push({
        type: 'geomLine',
        x: Math.random() * W,
        y: Math.random() * H,
        length: Math.random() * 90 + 35,
        angle: Math.random() * Math.PI * 2,
        alpha: Math.random() * 0.3 + 0.08,
        phase: Math.random() * Math.PI * 2,
        pulseSpeed: Math.random() * 0.01 + 0.004,
        color: i < 6 ? 'rgba(150,170,220,0.5)' : 'rgba(190,150,215,0.5)',
      });
    }
    return arr;
  }

  function createPage3Particles() {
    const arr = [];
    // Colorful translucent shadows (warm reds/browns)
    const weightWords = ['重量', '压力', '执念', '挣扎', '放下', '释然'];
    for (let i = 0; i < 14; i++) {
      arr.push({
        type: 'heavyShadow',
        x: Math.random() * W * 0.8 + W * 0.1,
        y: Math.random() * H,
        text: weightWords[Math.floor(Math.random() * weightWords.length)],
        size: Math.random() * 30 + 16,
        speed: Math.random() * 0.14 + 0.04,
        direction: Math.random() > 0.5 ? 1 : -1,
        alpha: Math.random() * 0.18 + 0.06,
        phase: Math.random() * Math.PI * 2,
        range: Math.random() * H * 0.35 + H * 0.12,
        centerY: Math.random() * H * 0.6 + H * 0.2,
        color: WARM_SHADOW[Math.floor(Math.random() * WARM_SHADOW.length)],
      });
    }
    // Colorful mist particles
    for (let i = 0; i < 10; i++) {
      arr.push({
        type: 'colorMist',
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 70 + 30,
        alpha: Math.random() * 0.08 + 0.03,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.15 + 0.05,
        directionX: (Math.random() - 0.5) * 0.4,
        color: ['rgba(200,140,110,0.4)', 'rgba(180,120,90,0.35)', 'rgba(210,155,135,0.4)'][Math.floor(Math.random() * 3)],
      });
    }
    return arr;
  }

  function createPage4Particles() {
    const arr = [];
    const cx = W / 2, cy = H / 2;
    // Colorful particles converging to center
    for (let i = 0; i < 70; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * Math.max(W, H) * 0.95 + 60;
      arr.push({
        type: 'converge',
        x: cx + Math.cos(angle) * dist,
        y: cy + Math.sin(angle) * dist,
        targetX: cx + (Math.random() - 0.5) * 40,
        targetY: cy + (Math.random() - 0.5) * 40,
        size: Math.random() * 3 + 0.8,
        alpha: Math.random() * 0.8 + 0.2,
        speed: Math.random() * 0.3 + 0.07,
        phase: Math.random() * Math.PI * 2,
        type2: Math.random() > 0.4 ? 'star' : 'dot',
        color: GOLDEN_CONVERGE[Math.floor(Math.random() * GOLDEN_CONVERGE.length)],
      });
    }
    return arr;
  }

  function setParticlesForPage(index) {
    switch (index) {
      case 0: particles = createCoverParticles(); break;
      case 1: particles = createPage1Particles(); break;
      case 2: particles = createPage2Particles(); break;
      case 3: particles = createPage3Particles(); break;
      case 4: particles = createPage4Particles(); break;
    }
  }

  // Initialize with cover particles
  setParticlesForPage(0);

  // ── Update particles ──
  function updateParticles() {
    const now = Date.now();
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];

      switch (p.type) {
        case 'starRise':
          p.y -= p.speed;
          p.x += Math.sin(now * 0.0006 + p.phase) * p.wanderX;
          p.alpha = 0.2 + Math.sin(now * 0.002 + p.phase) * 0.25 + 0.3;
          if (p.y < -40) { p.y = H + 40; p.x = Math.random() * W; }
          break;

        case 'glowDot':
          p.y -= p.speed * 0.25;
          p.x += Math.sin(now * 0.0007 + p.phase) * 0.3;
          p.alpha = 0.08 + Math.sin(now * 0.0015 + p.phase) * 0.08 + 0.06;
          if (p.y < -20) { p.y = H + 20; p.x = Math.random() * W; }
          break;

        case 'feather':
          p.y += p.speed;
          p.x += Math.sin(now * p.swaySpeed + p.phase) * p.sway;
          p.rotation += p.swaySpeed * 0.5;
          if (p.y > H + 50) { p.y = -50; p.x = Math.random() * W; }
          break;

        case 'wind':
          p.x += Math.cos(p.angle) * p.speed;
          p.y += Math.sin(p.angle) * p.speed;
          p.life -= p.decay;
          if (p.life <= 0) {
            p.life = 1;
            p.x = (Math.random() - 0.5) * W * 1.6;
            p.y = (Math.random() - 0.5) * H * 1.6;
            p.angle = Math.atan2(H / 2 - p.y, W / 2 - p.x) + (Math.random() - 0.5) * 0.9;
          }
          break;

        case 'innerWord':
          p.x += Math.cos(p.angle) * p.speed;
          p.y += Math.sin(p.angle) * p.speed;
          if (p.fadeIn) {
            p.alpha += 0.005;
            if (p.alpha >= 0.35) p.fadeIn = false;
          }
          p.life -= p.decay;
          if (p.life <= 0 || p.x < -120 || p.x > W + 120 || p.y < -120 || p.y > H + 120) {
            const edge = Math.random();
            if (edge < 0.25) { p.x = -80; p.y = Math.random() * H; }
            else if (edge < 0.5) { p.x = W + 80; p.y = Math.random() * H; }
            else if (edge < 0.75) { p.x = Math.random() * W; p.y = -80; }
            else { p.x = Math.random() * W; p.y = H + 80; }
            p.life = 1;
            p.fadeIn = true;
            p.alpha = 0;
            p.angle = Math.atan2(H / 2 - p.y, W / 2 - p.x) + (Math.random() - 0.5) * 0.7;
          }
          break;

        case 'lightDot':
          p.angle += (Math.random() - 0.5) * p.wander;
          p.x += Math.cos(p.angle) * p.speed;
          p.y += Math.sin(p.angle) * p.speed;
          p.alpha = 0.18 + Math.sin(now * p.pulseSpeed + p.phase) * 0.22 + Math.cos(now * p.pulseSpeed * 1.3) * 0.18;
          if (p.x < -30) p.x = W + 30;
          if (p.x > W + 30) p.x = -30;
          if (p.y < -30) p.y = H + 30;
          if (p.y > H + 30) p.y = -30;
          break;

        case 'geomLine':
          p.alpha = 0.06 + Math.sin(now * p.pulseSpeed + p.phase) * 0.1 + 0.07;
          p.angle += 0.0015;
          break;

        case 'heavyShadow':
          p.y += p.speed * p.direction;
          if (p.y > p.centerY + p.range || p.y < p.centerY - p.range) {
            p.direction *= -1;
          }
          p.alpha = 0.05 + Math.abs(Math.sin(now * 0.001 + p.phase)) * 0.1;
          break;

        case 'colorMist':
          p.x += Math.sin(now * 0.0007 + p.phase) * p.directionX;
          p.y += Math.cos(now * 0.0006 + p.phase) * p.speed * 0.5;
          p.alpha = 0.03 + Math.abs(Math.sin(now * 0.0012 + p.phase)) * 0.05;
          if (p.x < -100) p.x = W + 100;
          if (p.x > W + 100) p.x = -100;
          if (p.y < -100) p.y = H + 100;
          if (p.y > H + 100) p.y = -100;
          break;

        case 'converge':
          const dx = p.targetX - p.x;
          const dy = p.targetY - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 2) {
            p.x += (dx / dist) * p.speed;
            p.y += (dy / dist) * p.speed;
          }
          p.alpha = 0.2 + Math.sin(now * 0.0025 + p.phase) * 0.25 + 0.35;
          break;
      }
    }
  }

  // ── Draw particles ──
  function drawParticles() {
    ctx.clearRect(0, 0, W, H);

    for (const p of particles) {
      ctx.save();
      const a = Math.max(0, Math.min(1, p.alpha));

      switch (p.type) {
        case 'starRise':
          ctx.globalAlpha = a;
          const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 5);
          grd.addColorStop(0, p.color || 'rgba(255,210,120,0.9)');
          grd.addColorStop(0.3, (p.color || 'rgba(255,190,80,0.5)').replace('0.9', '0.45').replace('0.85', '0.4').replace('0.8', '0.4'));
          grd.addColorStop(1, 'rgba(255,200,100,0)');
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 5, 0, Math.PI * 2);
          ctx.fill();
          break;

        case 'glowDot':
          ctx.globalAlpha = a;
          const gdGrd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 3);
          gdGrd.addColorStop(0, p.color);
          gdGrd.addColorStop(1, 'rgba(255,200,120,0)');
          ctx.fillStyle = gdGrd;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
          ctx.fill();
          break;

        case 'feather':
          ctx.globalAlpha = a;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation);
          ctx.fillStyle = p.color || 'rgba(255,220,200,0.7)';
          ctx.beginPath();
          ctx.ellipse(0, 0, p.size * 0.35, p.size, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = (p.color || 'rgba(255,240,230,0.6)').replace('0.65', '0.4').replace('0.7', '0.45');
          ctx.beginPath();
          ctx.ellipse(0, -p.size * 0.3, p.size * 0.15, p.size * 0.7, 0, 0, Math.PI * 2);
          ctx.fill();
          break;

        case 'wind':
          ctx.globalAlpha = a * p.life;
          ctx.fillStyle = p.color || 'rgba(120,180,175,0.5)';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          break;

        case 'innerWord':
          ctx.globalAlpha = a * p.life;
          ctx.fillStyle = p.color || 'rgba(120,180,175,0.55)';
          ctx.font = `${p.size}px 'Source Han Serif SC', 'STSong', 'SimSun', serif`;
          ctx.fillText(p.text, p.x, p.y);
          break;

        case 'lightDot':
          ctx.globalAlpha = a;
          const lgrd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.glowSize);
          const lc = p.color || 'rgba(150,170,220,0.7)';
          lgrd.addColorStop(0, lc);
          lgrd.addColorStop(0.2, lc.replace('0.7', '0.35').replace('0.65', '0.3').replace('0.6', '0.28'));
          lgrd.addColorStop(0.5, lc.replace('0.7', '0.08').replace('0.65', '0.06').replace('0.6', '0.05'));
          lgrd.addColorStop(1, 'rgba(200,200,240,0)');
          ctx.fillStyle = lgrd;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.glowSize, 0, Math.PI * 2);
          ctx.fill();
          break;

        case 'geomLine':
          ctx.globalAlpha = a;
          ctx.strokeStyle = p.color || 'rgba(150,170,220,0.5)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p.x + Math.cos(p.angle) * p.length, p.y + Math.sin(p.angle) * p.length);
          ctx.stroke();
          break;

        case 'heavyShadow':
          ctx.globalAlpha = a;
          ctx.fillStyle = p.color || 'rgba(200,140,110,0.25)';
          ctx.font = `bold ${p.size}px 'Source Han Serif SC', 'STSong', 'SimSun', serif`;
          ctx.fillText(p.text, p.x, p.y);
          break;

        case 'colorMist':
          ctx.globalAlpha = a;
          const mistGrd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
          mistGrd.addColorStop(0, p.color || 'rgba(200,140,110,0.4)');
          mistGrd.addColorStop(1, 'rgba(200,140,110,0)');
          ctx.fillStyle = mistGrd;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          break;

        case 'converge':
          ctx.globalAlpha = a;
          const sgrd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 6);
          if (p.type2 === 'star') {
            sgrd.addColorStop(0, p.color || 'rgba(255,220,140,0.9)');
            sgrd.addColorStop(0.35, (p.color || 'rgba(255,200,100,0.5)').replace('0.9', '0.35').replace('0.85', '0.3').replace('0.8', '0.28'));
            sgrd.addColorStop(1, 'rgba(255,200,100,0)');
          } else {
            sgrd.addColorStop(0, (p.color || 'rgba(255,235,170,0.85)').replace('0.9', '0.7').replace('0.85', '0.65').replace('0.8', '0.6'));
            sgrd.addColorStop(0.35, 'rgba(255,230,160,0.15)');
            sgrd.addColorStop(1, 'rgba(255,220,140,0)');
          }
          ctx.fillStyle = sgrd;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 6, 0, Math.PI * 2);
          ctx.fill();
          break;
      }
      ctx.restore();
    }
  }

  // ── Animation loop ──
  function animate() {
    updateParticles();
    drawParticles();
    requestAnimationFrame(animate);
  }
  animate();

  /* ==================== PAGE NAVIGATION ==================== */
  function triggerPoemLines(pageEl) {
    const lines = pageEl.querySelectorAll('.poem-line');
    lines.forEach(line => line.classList.add('visible'));
  }

  function resetPoemLines(pageEl) {
    const lines = pageEl.querySelectorAll('.poem-line');
    lines.forEach(line => line.classList.remove('visible'));
  }

  function reanimateCover(pageEl) {
    // Force replay cover page CSS animations
    const title = pageEl.querySelector('.cover-title');
    const subtitle = pageEl.querySelector('.cover-subtitle');
    const line = pageEl.querySelector('.cover-line');
    const hint = pageEl.querySelector('.scroll-hint');

    [title, subtitle, line, hint].forEach(el => {
      if (!el) return;
      el.style.animation = 'none';
      void el.offsetWidth; // force reflow
      el.style.animation = '';
    });
  }

  function setActivePage(index) {
    if (index < 0 || index >= totalPages) return;
    if (isTransitioning) return;

    const now = Date.now();
    if (now < transitionLockUntil) return;
    isTransitioning = true;
    transitionLockUntil = now + 1400;

    // Deactivate current
    const curPage = pages[currentPage];
    curPage.classList.remove('active');
    resetPoemLines(curPage);

    // Special: remove final-dim from page 4 when leaving
    if (currentPage === 4) {
      curPage.classList.remove('final-dim');
    }

    // Update nav dots
    navDots[currentPage].classList.remove('active');

    // Activate new
    currentPage = index;
    const newPage = pages[currentPage];
    newPage.classList.add('active');
    navDots[currentPage].classList.add('active');

    // Switch particles
    setParticlesForPage(index);

    // Trigger animations based on page type
    if (index === 0) {
      // Replay cover page entry animations
      setTimeout(() => reanimateCover(newPage), 50);
    } else {
      // Trigger poem line animations after transition starts
      setTimeout(() => {
        triggerPoemLines(newPage);
      }, 100);
    }

    // Page 4 special: dim after all text settled
    if (index === 4) {
      setTimeout(() => {
        newPage.classList.add('final-dim');
      }, 5500);
    }

    setTimeout(() => {
      isTransitioning = false;
    }, 1400);
  }

  /* ==================== EVENT HANDLERS ==================== */
  // Mouse wheel
  let wheelAccum = 0;
  window.addEventListener('wheel', function(e) {
    e.preventDefault();
    wheelAccum += e.deltaY;
    if (Math.abs(wheelAccum) > 50) {
      if (wheelAccum > 0) setActivePage(currentPage + 1);
      else setActivePage(currentPage - 1);
      wheelAccum = 0;
    }
  }, { passive: false });

  // Touch
  let touchStartY = 0;
  let touchMoved = false;
  window.addEventListener('touchstart', function(e) {
    touchStartY = e.touches[0].clientY;
    touchMoved = false;
  }, { passive: false });

  window.addEventListener('touchmove', function(e) {
    e.preventDefault();
    touchMoved = true;
  }, { passive: false });

  window.addEventListener('touchend', function(e) {
    if (!touchMoved) return;
    const deltaY = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(deltaY) > 40) {
      if (deltaY > 0) setActivePage(currentPage + 1);
      else setActivePage(currentPage - 1);
    }
  });

  // Keyboard
  window.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowDown' || e.key === 'PageDown') {
      e.preventDefault();
      setActivePage(currentPage + 1);
    } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault();
      setActivePage(currentPage - 1);
    }
  });

  // Nav dots click
  navDots.forEach(dot => {
    dot.addEventListener('click', function() {
      const idx = parseInt(this.getAttribute('data-index'));
      if (idx !== currentPage) setActivePage(idx);
    });
  });

  /* ==================== INIT ==================== */
  // Trigger cover animations (title reveal is CSS-driven, poems on page 0 don't exist)
  // Initial page is already active via HTML class

  // Preload: briefly show and hide page 1-4 lines to cache
  // (not needed since CSS transitions handle visibility)

  console.log('终将落地的心 — 致2026高考生');
  console.log('温柔治愈 · 新中式极简文艺');
  console.log('滚轮/触屏上下滑动翻页');
})();
</script>
